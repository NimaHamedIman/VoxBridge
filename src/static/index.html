<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxBridge</title>
    <style>
        /* ---------- پایه ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background: #0f1420;
            color: #e8eaf0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ---------- هدر ---------- */
        header {
            padding: 16px 24px;
            background: #161d2e;
            border-bottom: 1px solid #2a3550;
        }

        header h1 {
            font-size: 20px;
        }

        header p {
            font-size: 13px;
            color: #8b93a7;
        }

        /* ---------- ناحیهٔ پیام‌ها ---------- */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 14px;
            line-height: 1.5;
        }

        .user {
            align-self: flex-end;
            background: #2f6fed;
        }

        .assistant {
            align-self: flex-start;
            background: #232c42;
        }

        /* ---------- نوار ورودی ---------- */
        #input-bar {
            display: flex;
            gap: 8px;
            padding: 14px 20px;
            background: #161d2e;
            border-top: 1px solid #2a3550;
        }

        #message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #2a3550;
            border-radius: 10px;
            background: #0f1420;
            color: #e8eaf0;
            font-size: 15px;
        }

        #send-button {
            padding: 12px 22px;
            border: none;
            border-radius: 10px;
            background: #2f6fed;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        #send-button:hover {
            background: #245ac9;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎙️ VoxBridge</h1>
        <p>Dein KI-Sprachassistent</p>
    </header>

    <div id="chat-box"></div>

    <div id="input-bar">
        <input type="text" id="message-input"
               placeholder="Schreib eine Nachricht..." autocomplete="off">
        <button id="send-button">Senden</button>
    </div>


<script>
        // ---------- ۱. گرفتن دستگیرهٔ عناصر ----------
        const chatBox = document.getElementById("chat-box");
        const input   = document.getElementById("message-input");
        const button  = document.getElementById("send-button");

        // ---------- ۲. آدرس سرور و شناسهٔ جلسه ----------
        const API_URL = "https://voice.nimaserver.xyz/chat";
        let sessionId = localStorage.getItem("voxbridge_session");

        // ---------- ۳. ساخت حباب پیام ----------
        function addMessage(text, sender) {
            const bubble = document.createElement("div");
            bubble.className = "message " + sender;
            bubble.textContent = text;
            chatBox.appendChild(bubble);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // ---------- ۴. ارسال پیام به سرور ----------
        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, "user");
            input.value = "";
            button.disabled = true;

            try {
                const formData = new FormData();
                formData.append("message", text);
                if (sessionId) {
                    formData.append("session_id", sessionId);
                }

                const response = await fetch(API_URL, {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    throw new Error("Server-Fehler: " + response.status);
                }

                const data = await response.json();

                sessionId = data.session_id;
                localStorage.setItem("voxbridge_session", sessionId);

                addMessage(data.response, "assistant");

            } catch (error) {
                addMessage("⚠️ Fehler: " + error.message, "assistant");
            } finally {
                button.disabled = false;
                input.focus();
            }
        }

        // ---------- ۵. اتصال رویدادها ----------
        button.addEventListener("click", sendMessage);
        input.addEventListener("keydown", function (event) {
            if (event.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
