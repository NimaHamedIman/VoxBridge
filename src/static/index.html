<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxBridge</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header>
        <h1>🎙️ VoxBridge</h1>
        <p>Dein KI-Sprachassistent</p>
    </header>

    <div id="chat-box"></div>

    <div id="input-bar">
        <input type="text" id="message-input"
               placeholder="Schreib eine Nachricht..." autocomplete="off">
        <button id="send-button">Senden</button>
        <select id="langSelect" title="Sprache">
            <option value="de">🇩🇪 Deutsch</option>
            <option value="en">🇬🇧 English</option>
            <option value="fa" selected>🇮🇷 فارسی</option>
        </select>
        <button id="mic-button" title="Sprachnachricht">🎙️</button>
    </div>


<script src="/static/app.js"></script>
</body>
</html>
